# ============================================
# IALOC Restaurant Reservation System
# Docker Compose Configuration
# ============================================

services:
  # Laravel API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ialoc-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    environment:
      - APP_NAME=IALOC
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - LOG_CHANNEL=stderr
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DB_CONNECTION=${DB_CONNECTION:-sqlite}
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - CACHE_STORE=file
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=sync
    volumes:
      - sqlite_data:/var/www/html/database
      - storage_logs:/var/www/html/storage/logs
    networks:
      - ialoc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # MySQL Database (optional - for production)
  mysql:
    image: mysql:8.0
    container_name: ialoc-mysql
    restart: unless-stopped
    profiles:
      - mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-ialoc}
      MYSQL_USER: ${DB_USERNAME:-ialoc}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ialoc-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis Cache (optional - for production)
  redis:
    image: redis:7-alpine
    container_name: ialoc-redis
    restart: unless-stopped
    profiles:
      - redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - ialoc-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  ialoc-network:
    driver: bridge

volumes:
  sqlite_data:
    driver: local
  storage_logs:
    driver: local
  mysql_data:
    driver: local
  redis_data:
    driver: local
