<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5252"/>
      <stop offset="50%" style="stop-color:#E53935"/>
      <stop offset="100%" style="stop-color:#B71C1C"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="200" height="200" rx="28" fill="url(#bgGradient)"/>
  <!-- Decorative top line -->
  <rect x="40" y="35" width="120" height="4" rx="2" fill="white" opacity="0.6"/>
  <!-- Main logo text -->
  <text x="100" y="130" font-family="Arial Black, Helvetica, sans-serif" font-size="68" font-weight="900" fill="white" text-anchor="middle" filter="url(#shadow)" letter-spacing="-2">ialoc</text>
  <!-- Decorative bottom line -->
  <rect x="40" y="155" width="120" height="4" rx="2" fill="white" opacity="0.6"/>
  <!-- Subtle inner glow effect -->
  <rect x="4" y="4" width="192" height="192" rx="26" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
</svg>
